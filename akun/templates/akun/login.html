{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem Mahasiswa</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .login-container{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            margin-bottom:20px;
        }

        .logo h1{
            color:#2a5298;
            font-size:28px;
        }

        .logo p{
            color:#777;
            font-size:14px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#2a5298;
            outline:none;
            box-shadow:0 0 8px rgba(42,82,152,0.3);
        }

        .btn-login{
            width:100%;
            padding:12px;
            background:#2a5298;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1e3c72;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#888;
            font-size:13px;
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>🎓 Sistem Mahasiswa</h1>
        <p>Silakan login untuk melanjutkan</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Masukkan username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>
    </form>

    <div class="footer">
        © 2026 Sistem Informasi Mahasiswa
    </div>

</div>

</body>
</html>
